<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>RubikTimer</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
height:100vh;
}

h1{
margin-top:15px;
color:#ffd93d;
}

/* ===== CUBE (mniejszy) ===== */
#cubeCross{
display:inline-block;
margin-top:10px;
transform:scale(0.8); /* 🔥 zmniejsza całość */
}

.faceRow{
display:flex;
justify-content:center;
margin-bottom:4px;
}

.middleRow{
display:flex;
justify-content:center;
margin-bottom:4px;
gap:10px;
}

.face{
width:26px;
height:26px;
margin:1px;
border:2px solid #111;
border-radius:4px;
}

/* kolory */
.U{background:#ffffff;}
.D{background:#ffff00;}
.F{background:#00cc44;}
.B{background:#0044ff;}
.R{background:#ff3333;}
.L{background:#ff9900;}

/* ===== SCRAMBLE ===== */
#scramble{
font-size:22px;
margin-top:10px;
letter-spacing:2px;
}

/* ===== TIMER ===== */
#timer{
font-size:90px; /* 🔥 mniejszy ale nadal duży */
margin-top:20px;
}

.ready{
color:#00ff88;
}

/* ===== STATS ===== */
#stats{
margin-top:10px;
font-size:18px;
}

button{
margin-top:10px;
padding:6px 12px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

button:hover{
background:#ff1e4d;
}

/* ===== LISTA ===== */
#timesBox{
position:fixed;
left:15px;
bottom:15px;
background:rgba(0,0,0,0.4);
padding:12px;
border-radius:10px;
width:200px;
max-height:260px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border-bottom:1px solid rgba(255,255,255,0.2);
padding:3px;
font-size:13px;
}
</style>
</head>

<body>

<h1>RubikTimer</h1>

<div id="cubeCross">

<!-- U -->
<div class="faceRow">
<div class="face U"></div><div class="face U"></div><div class="face U"></div>
</div>
<div class="faceRow">
<div class="face U"></div><div class="face U"></div><div class="face U"></div>
</div>
<div class="faceRow">
<div class="face U"></div><div class="face U"></div><div class="face U"></div>
</div>

<!-- MIDDLE -->
<div class="middleRow">
<div class="face L"></div><div class="face L"></div><div class="face L"></div>
<div class="face F"></div><div class="face F"></div><div class="face F"></div>
<div class="face R"></div><div class="face R"></div><div class="face R"></div>
<div class="face B"></div><div class="face B"></div><div class="face B"></div>
</div>

<div class="middleRow">
<div class="face L"></div><div class="face L"></div><div class="face L"></div>
<div class="face F"></div><div class="face F"></div><div class="face F"></div>
<div class="face R"></div><div class="face R"></div><div class="face R"></div>
<div class="face B"></div><div class="face B"></div><div class="face B"></div>
</div>

<div class="middleRow">
<div class="face L"></div><div class="face L"></div><div class="face L"></div>
<div class="face F"></div><div class="face F"></div><div class="face F"></div>
<div class="face R"></div><div class="face R"></div><div class="face R"></div>
<div class="face B"></div><div class="face B"></div><div class="face B"></div>
</div>

<!-- D -->
<div class="faceRow">
<div class="face D"></div><div class="face D"></div><div class="face D"></div>
</div>
<div class="faceRow">
<div class="face D"></div><div class="face D"></div><div class="face D"></div>
</div>
<div class="faceRow">
<div class="face D"></div><div class="face D"></div><div class="face D"></div>
</div>

</div>

<div id="scramble"></div>
<div id="timer">0.000</div>

<div id="stats">
PB: <span id="pb">-</span> |
AO5: <span id="ao5">-</span>
</div>

<button onclick="clearTimes()">Usuń czasy</button>

<div id="timesBox">
<h3>Czasy</h3>
<table>
<tbody id="timesTable"></tbody>
</table>
</div>

<script>
let timer=document.getElementById("timer")
let scrambleText=document.getElementById("scramble")
let table=document.getElementById("timesTable")

let running=false
let ready=false
let startTime
let interval

let times=JSON.parse(localStorage.getItem("rubikTimes"))||[]

const moves=["R","L","U","D","F","B"]
const mods=["","'","2"]

function newScramble(){
let scramble=[]
for(let i=0;i<20;i++){
let move=moves[Math.floor(Math.random()*moves.length)]
let mod=mods[Math.floor(Math.random()*mods.length)]
scramble.push(move+mod)
}
scrambleText.innerText=scramble.join(" ")
}

function updateTimer(){
let time=(Date.now()-startTime)/1000
timer.innerText=time.toFixed(3)
}

function saveTimes(){
localStorage.setItem("rubikTimes",JSON.stringify(times))
}

function showTimes(){
table.innerHTML=""
times.forEach((t,i)=>{
let row=document.createElement("tr")
row.innerHTML=`<td>${i+1}</td><td>${t.toFixed(3)}</td>`
table.appendChild(row)
})
}

function calculatePB(){
if(times.length===0)return
document.getElementById("pb").innerText=Math.min(...times).toFixed(3)
}

function calculateAO5(){
if(times.length<5)return
let last5=times.slice(-5)
let max=Math.max(...last5)
let min=Math.min(...last5)
let avg=last5.filter(t=>t!==max && t!==min)
.reduce((a,b)=>a+b)/3
document.getElementById("ao5").innerText=avg.toFixed(3)
}

function clearTimes(){
if(confirm("Usunąć wszystkie czasy?")){
times=[]
saveTimes()
showTimes()
document.getElementById("pb").innerText="-"
document.getElementById("ao5").innerText="-"
}
}

document.addEventListener("keydown",e=>{
if(e.code==="Space" && !running){
timer.classList.add("ready")
ready=true
}
})

document.addEventListener("keyup",e=>{
if(e.code==="Space"){
if(!running && ready){
timer.classList.remove("ready")
running=true
ready=false
startTime=Date.now()
interval=setInterval(updateTimer,10)
}
else if(running){
clearInterval(interval)
running=false
let final=(Date.now()-startTime)/1000
times.push(final)
saveTimes()
showTimes()
calculatePB()
calculateAO5()
newScramble()
timer.innerText=final.toFixed(3)
}
}
})

newScramble()
showTimes()
calculatePB()
calculateAO5()
</script>

</body>
</html>
