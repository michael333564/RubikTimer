<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Rubik Timer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #ffd93d;
      font-size: 48px;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
    }

    /* Krzyżyk kostki */
    #cubeCross {
      display: inline-block;
      margin-bottom: 30px;
      transform: scale(0.9);
    }

    .faceRow, .middleRow {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }

    .middleRow {
      gap: 20px;
    }

    .faceBlock {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .face {
      width: 30px;
      height: 30px;
      border: 2px solid #111;
      border-radius: 6px;
    }

    .U { background: #ffffff; }
    .D { background: #ffff00; }
    .F { background: #ff0000; }
    .B { background: #0000ff; }
    .R { background: #ff8000; }
    .L { background: #00ff00; }

    /* Scramble */
    #scramble {
      font-size: 24px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* Timer */
    #timer {
      font-size: 100px;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s;
    }

    #timer.ready {
      color: #00ff88;
      transform: scale(1.1);
    }

    #stats {
      margin-top: 15px;
      font-size: 20px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #ff1e4d;
    }

    /* Lista czasów */
    #timesBox {
      position: fixed;
      left: 20px;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      max-height: 300px;
      overflow: auto;
    }

    #timesBox h3 {
      margin-top: 0;
      color: #ffd93d;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px;
      font-size: 14px;
    }

    /* Responsywność */
    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }
      #timer {
        font-size: 70px;
      }
      #scramble {
        font-size: 20px;
      }
      .face {
        width: 20px;
        height: 20px;
      }
      .middleRow {
        gap: 10px;
      }
      button {
        padding: 8px 16px;
        font-size: 14px;
      }
      #timesBox {
        width: 180px;
        left: 10px;
        bottom: 10px;
      }
      td {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <h1>Rubik Timer</h1>

  <!-- Krzyżyk kostki -->
  <div id="cubeCross">

    <!-- U -->
    <div class="faceRow">
      <div class="face U"></div><div class="face U"></div><div class="face U"></div>
    </div>
    <div class="faceRow">
      <div class="face U"></div><div class="face U"></div><div class="face U"></div>
    </div>
    <div class="faceRow">
      <div class="face U"></div><div class="face U"></div><div class="face U"></div>
    </div>

    <!-- Środek -->
    <div class="middleRow">
      <div class="faceBlock">
        <div class="face L"></div><div class="face L"></div><div class="face L"></div>
        <div class="face L"></div><div class="face L"></div><div class="face L"></div>
        <div class="face L"></div><div class="face L"></div><div class="face L"></div>
      </div>

      <div class="faceBlock">
        <div class="face F"></div><div class="face F"></div><div class="face F"></div>
        <div class="face F"></div><div class="face F"></div><div class="face F"></div>
        <div class="face F"></div><div class="face F"></div><div class="face F"></div>
      </div>

      <div class="faceBlock">
        <div class="face R"></div><div class="face R"></div><div class="face R"></div>
        <div class="face R"></div><div class="face R"></div><div class="face R"></div>
        <div class="face R"></div><div class="face R"></div><div class="face R"></div>
      </div>

      <div class="faceBlock">
        <div class="face B"></div><div class="face B"></div><div class="face B"></div>
        <div class="face B"></div><div class="face B"></div><div class="face B"></div>
        <div class="face B"></div><div class="face B"></div><div class="face B"></div>
      </div>
    </div>

    <!-- D -->
    <div class="faceRow">
      <div class="face D"></div><div class="face D"></div><div class="face D"></div>
    </div>
    <div class="faceRow">
      <div class="face D"></div><div class="face D"></div><div class="face D"></div>
    </div>
    <div class="faceRow">
      <div class="face D"></div><div class="face D"></div><div class="face D"></div>
    </div>

  </div>

  <div id="scramble"></div>
  <div id="timer">0.000</div>

  <div id="stats">
    PB: <span id="pb">-</span> | AO5: <span id="ao5">-</span>
  </div>

  <button onclick="clearTimes()">Usuń czasy</button>

  <div id="timesBox">
    <h3>Czasy</h3>
    <table>
      <tbody id="timesTable"></tbody>
    </table>
  </div>

  <script>
    let timer = document.getElementById("timer");
    let scrambleText = document.getElementById("scramble");
    let table = document.getElementById("timesTable");

    let running = false;
    let ready = false;
    let startTime;
    let interval;

    let times = JSON.parse(localStorage.getItem("rubikTimes")) || [];

    const moves = ["R", "L", "U", "D", "F", "B"];
    const mods = ["", "'", "2"];

    function newScramble() {
      let scramble = [];
      for (let i = 0; i < 20; i++) {
        let move = moves[Math.floor(Math.random() * moves.length)];
        let mod = mods[Math.floor(Math.random() * mods.length)];
        scramble.push(move + mod);
      }
      scrambleText.innerText = scramble.join(" ");
    }

    function updateTimer() {
      let time = (Date.now() - startTime) / 1000;
      timer.innerText = time.toFixed(3);
    }

    function saveTimes() {
      localStorage.setItem("rubikTimes", JSON.stringify(times));
    }

    function showTimes() {
      table.innerHTML = "";
      times.forEach((t, i) => {
        let row = document.createElement("tr");
        row.innerHTML = `<td>${i + 1}</td><td>${t.toFixed(3)}</td>`;
        table.appendChild(row);
      });
    }

    function calculatePB() {
      if (times.length === 0) return;
      document.getElementById("pb").innerText = Math.min(...times).toFixed(3);
    }

    function calculateAO5() {
      if (times.length < 5) return;
      let last5 = times.slice(-5);
      let max = Math.max(...last5);
      let min = Math.min(...last5);
      let avg = last5.filter(t => t !== max && t !== min)
        .reduce((a, b) => a + b, 0) / 3;
      document.getElementById("ao5").innerText = avg.toFixed(3);
    }

    function clearTimes() {
      if (confirm("Usunąć wszystkie czasy?")) {
        times = [];
        saveTimes();
        showTimes();
        document.getElementById("pb").innerText = "-";
        document.getElementById("ao5").innerText = "-";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !running) {
        timer.classList.add("ready");
        ready = true;
      }
    });

    document.addEventListener("keyup", e => {
      if (e.code === "Space") {
        if (!running && ready) {
          timer.classList.remove("ready");
          running = true;
          ready = false;
          startTime = Date.now();
          interval = setInterval(updateTimer, 10);
        } else if (running) {
          clearInterval(interval);
          running = false;
          let final = (Date.now() - startTime) / 1000;
          times.push(final);
          saveTimes();
          showTimes();
          calculatePB();
          calculateAO5();
          newScramble();
          timer.innerText = final.toFixed(3);
        }
      }
    });

    newScramble();
    showTimes();
    calculatePB();
    calculateAO5();
  </script>

</body>
</html>
