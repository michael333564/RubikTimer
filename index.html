<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>RkTimer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #ffd93d;
      font-size: 48px;
      text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
    }

    /* Krzyżyk kostki */
    #cubeCross {
      display: inline-block;
      margin-bottom: 30px;
      transform: scale(0.9);
    }

    .faceRow, .middleRow {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }

    .middleRow {
      gap: 20px;
    }

    .faceBlock {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .face {
      width: 30px;
      height: 30px;
      border: 2px solid #111;
      border-radius: 6px;
    }

    .U { background: #ffffff; }
    .D { background: #ffff00; }
    .F { background: #ff0000; }
    .B { background: #0000ff; }
    .R { background: #ff8000; }
    .L { background: #00ff00; }

    /* Scramble */
    #scramble {
      font-size: 24px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* Timer */
    #timer {
      font-size: 100px;
      margin: 20px 0;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
      transition: transform 0.2s;
    }

    #timer.ready {
      color: #00ff88;
      transform: scale(1.1);
    }

    #stats {
      margin-top: 15px;
      font-size: 20px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #ff1e4d;
    }

    /* Lista czasów */
    #timesBox {
      position: fixed;
      left: 20px;
      bottom: 20px;
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      max-height: 300px;
      overflow: auto;
    }

    #timesBox h3 {
      margin-top: 0;
      color: #ffd93d;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px;
      font-size: 14px;
    }

    /* Responsywność */
    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }
      #timer {
        font-size: 70px;
      }
      #scramble {
        font-size: 20px;
      }
      .face {
        width: 20px;
        height: 20px;
      }
      .middleRow {
        gap: 10px;
      }
      button {
        padding: 8px 16px;
        font-size: 14px;
      }
      #timesBox {
        width: 180px;
        left: 10px;
        bottom: 10px;
      }
      td {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <h1>Rubik Timer</h1>

  <!-- Krzyżyk kostki -->
  <div id="cubeCross">

    <!-- U -->
    <div class="faceRow">
      <div class="face U" id="U1"></div><div class="face U" id="U2"></div><div class="face U" id="U3"></div>
    </div>
    <div class="faceRow">
      <div class="face U" id="U4"></div><div class="face U" id="U5"></div><div class="face U" id="U6"></div>
    </div>
    <div class="faceRow">
      <div class="face U" id="U7"></div><div class="face U" id="U8"></div><div class="face U" id="U9"></div>
    </div>

    <!-- Środek -->
    <div class="middleRow">
      <div class="faceBlock">
        <div class="face L" id="L1"></div><div class="face L" id="L2"></div><div class="face L" id="L3"></div>
        <div class="face L" id="L4"></div><div class="face L" id="L5"></div><div class="face L" id="L6"></div>
        <div class="face L" id="L7"></div><div class="face L" id="L8"></div><div class="face L" id="L9"></div>
      </div>

      <div class="faceBlock">
        <div class="face F" id="F1"></div><div class="face F" id="F2"></div><div class="face F" id="F3"></div>
        <div class="face F" id="F4"></div><div class="face F" id="F5"></div><div class="face F" id="F6"></div>
        <div class="face F" id="F7"></div><div class="face F" id="F8"></div><div class="face F" id="F9"></div>
      </div>

      <div class="faceBlock">
        <div class="face R" id="R1"></div><div class="face R" id="R2"></div><div class="face R" id="R3"></div>
        <div class="face R" id="R4"></div><div class="face R" id="R5"></div><div class="face R" id="R6"></div>
        <div class="face R" id="R7"></div><div class="face R" id="R8"></div><div class="face R" id="R9"></div>
      </div>

      <div class="faceBlock">
        <div class="face B" id="B1"></div><div class="face B" id="B2"></div><div class="face B" id="B3"></div>
        <div class="face B" id="B4"></div><div class="face B" id="B5"></div><div class="face B" id="B6"></div>
        <div class="face B" id="B7"></div><div class="face B" id="B8"></div><div class="face B" id="B9"></div>
      </div>
    </div>

    <!-- D -->
    <div class="faceRow">
      <div class="face D" id="D1"></div><div class="face D" id="D2"></div><div class="face D" id="D3"></div>
    </div>
    <div class="faceRow">
      <div class="face D" id="D4"></div><div class="face D" id="D5"></div><div class="face D" id="D6"></div>
    </div>
    <div class="faceRow">
      <div class="face D" id="D7"></div><div class="face D" id="D8"></div><div class="face D" id="D9"></div>
    </div>

  </div>

  <div id="scramble"></div>
  <div id="timer">0.000</div>

  <div id="stats">
    PB: <span id="pb">-</span> | AO5: <span id="ao5">-</span>
  </div>

  <button onclick="clearTimes()">Usuń czasy</button>

  <div id="timesBox">
    <h3>Czasy</h3>
    <table>
      <tbody id="timesTable"></tbody>
    </table>
  </div>

  <script>
    let timer = document.getElementById("timer");
    let scrambleText = document.getElementById("scramble");
    let table = document.getElementById("timesTable");

    let running = false;
    let ready = false;
    let startTime;
    let interval;

    let times = JSON.parse(localStorage.getItem("rubikTimes")) || [];

    const moves = ["R", "L", "U", "D", "F", "B"];
    const mods = ["", "'", "2"];

    // Reprezentacja kostki (6 ścian, każda z 9 polami)
    let cube = {
      U: Array(9).fill('U'),
      D: Array(9).fill('D'),
      F: Array(9).fill('F'),
      B: Array(9).fill('B'),
      R: Array(9).fill('R'),
      L: Array(9).fill('L')
    };

    function newScramble() {
      let scramble = [];
      for (let i = 0; i < 20; i++) {
        let move = moves[Math.floor(Math.random() * moves.length)];
        let mod = mods[Math.floor(Math.random() * mods.length)];
        scramble.push(move + mod);
      }
      scrambleText.innerText = scramble.join(" ");
      applyScramble(scramble);
      updateCubeCross();
    }

    // Funkcja, która aplikuje ruchy i aktualizuje kostkę
    function applyScramble(scramble) {
      // Reset kostki
      cube = {
        U: Array(9).fill('U'),
        D: Array(9).fill('D'),
        F: Array(9).fill('F'),
        B: Array(9).fill('B'),
        R: Array(9).fill('R'),
        L: Array(9).fill('L')
      };

      scramble.forEach(move => {
        applyMove(cube, move);
      });
    }

    // Funkcja wykonująca jeden ruch na tablicy
    function applyMove(cube, move) {
      // Tylko przykład dla ruchu U (góra), resztę trzeba dodać analogicznie
      if (move[0] === 'U') {
        rotateFace(cube.U, move.length > 1 ? move[1] : "");
        // Tutaj dodaj logikę przesuwania sąsiednich ścian dla U
        // Na razie pozostawiam uproszczone, trzeba dodać przesunięcia L, F, R, B
      }
      // Analogicznie dodaj logikę dla ruchów R, L, F, B, D
    }

    // Rotacja pojedynczej ściany 90 stopni
    function rotateFace(face, mod) {
      // Rotacja w prawo 90°
      const rotated = [face[6], face[3], face[0], face[7], face[4], face[1], face[8], face[5], face[2]];
      if (mod === "'") {
        // Rotacja w lewo (odwrotna)
        face.splice(0, 9, face[2], face[5], face[8], face[1], face[4], face[7], face[0], face[3], face[6]);
      } else if (mod === "2") {
        // Rotacja o 180°
        face.splice(0, 9, face[8], face[7], face[6], face[5], face[4], face[3], face[2], face[1], face[0]);
      } else {
        // Rotacja w prawo (standard)
        face.splice(0, 9, ...rotated);
      }
    }

    // Aktualizacja krzyżyka na podstawie stanu kostki
    function updateCubeCross() {
      for (let face of Object.keys(cube)) {
        cube[face].forEach((color, i) => {
          const el = document.getElementById(face + (i + 1));
          if (el) el.className = "face " + color;
        });
      }
    }

    function updateTimer() {
      let time = (Date.now() - startTime) / 1000;
      timer.innerText = time.toFixed(3);
    }

    function saveTimes() {
      localStorage.setItem("rubikTimes", JSON.stringify(times));
    }

    function showTimes() {
      table.innerHTML = "";
      times.forEach((t, i) => {
        let row = document.createElement("tr");
        row.innerHTML = `<td>${i + 1}</td><td>${t.toFixed(3)}</td>`;
        table.appendChild(row);
      });
    }

    function calculatePB() {
      if (times.length === 0) return;
      document.getElementById("pb").innerText = Math.min(...times).toFixed(3);
    }

    function calculateAO5() {
      if (times.length < 5) return;
      let last5 = times.slice(-5);
      let max = Math.max(...last5);
      let min = Math.min(...last5);
      let avg = last5.filter(t => t !== max && t !== min)
        .reduce((a, b) => a + b, 0) / 3;
      document.getElementById("ao5").innerText = avg.toFixed(3);
    }

    function clearTimes() {
      if (confirm("Usunąć wszystkie czasy?")) {
        times = [];
        saveTimes();
        showTimes();
        document.getElementById("pb").innerText = "-";
        document.getElementById("ao5").innerText = "-";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !running) {
        timer.classList.add("ready");
        ready = true;
      }
    });

    document.addEventListener("keyup", e => {
      if (e.code === "Space") {
        if (!running && ready) {
          timer.classList.remove("ready");
          running = true;
          ready = false;
          startTime = Date.now();
          interval = setInterval(updateTimer, 10);
        } else if (running) {
          clearInterval(interval);
          running = false;
          let final = (Date.now() - startTime) / 1000;
          times.push(final);
          saveTimes();
          showTimes();
          calculatePB();
          calculateAO5();
          newScramble();
          timer.innerText = final.toFixed(3);
        }
      }
    });

    newScramble();
    showTimes();
    calculatePB();
    calculateAO5();
  </script>

</body>
</html>
